<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ACL Color Scheme 1 - Blue Gray</title>
<style>
body {
  margin: 0;
  padding: 40px;
  font-family: "Helvetica Neue", Arial, sans-serif;
  background: #ffffff;
}

.figure {
  width: 800px;
  padding: 40px;
  background: linear-gradient(to bottom, #F6F8FB, #EDF1F6);
  border-radius: 12px;
}

.panel {
  padding: 24px;
  margin-bottom: 20px;
  background: linear-gradient(135deg, #E3ECF8, #D3E0F2);
  border: 1px solid rgba(175, 195, 221, 0.7);
  border-radius: 10px;
}

.title {
  font-size: 20px;
  font-weight: 600;
  color: #2B3A55;
  margin-bottom: 8px;
}

.text {
  font-size: 15px;
  color: #4A5568;
  line-height: 1.6;
}

.note {
  font-size: 13px;
  color: #6B7280;
}

.arrow {
  margin: 16px 0;
  color: #8A94A6;
  font-size: 18px;
}
</style>
</head>

<body>
  <div class="figure">
    <div class="panel">
      <div class="title">Problem Definition</div>
      <div class="text">User instruction is ambiguous across applications.</div>
      <div class="note">Preference inference is required.</div>
    </div>

    <div class="arrow">↓</div>

    <div class="panel">
      <div class="title">Proposed Method</div>
      <div class="text">Leverages user history for application selection.</div>
    </div>
  </div>
</body>
</html>
